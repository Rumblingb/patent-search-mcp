name: patent-search-mcp
description: MCP server for searching and retrieving USPTO patent data via Google Patents API
version: 1.0.0
author: Nous Research

tools:
  search_patents:
    description: Search patents by keyword query
    input:
      type: object
      properties:
        query:
          type: string
          description: Patent search query (e.g. "machine learning", "USPTO")
          example: "machine learning"
        limit:
          type: integer
          description: Maximum number of results to return (default 10, max 50)
          default: 10
    output:
      type: array
      items:
        type: object
        properties:
          patent_id:
            type: string
            description: Patent number / ID
          title:
            type: string
            description: Patent title
          abstract:
            type: string
            description: Patent abstract
          assignee:
            type: string
            description: Assignee (company/organization)
          inventors:
            type: string
            description: Inventor names
          filing_date:
            type: string
            description: Filing date
          publication_date:
            type: string
            description: Publication date
          cpc_classifications:
            type: string
            description: CPC classification codes
          url:
            type: string
            description: Google Patents URL

  get_patent_details:
    description: Get detailed information for a specific patent by ID
    input:
      type: object
      properties:
        patent_id:
          type: string
          description: Patent ID (e.g. US10529241B2, US20200012345A1)
          example: "US10529241B2"
    output:
      type: object
      properties:
        patent_id:
          type: string
        title:
          type: string
        abstract:
          type: string
        assignee:
          type: string
        inventors:
          type: string
        filing_date:
          type: string
        publication_date:
          type: string
        priority_date:
          type: string
        cpc_classifications:
          type: string
        ipc_classifications:
          type: string
        claims:
          type: string
        description:
          type: string
        url:
          type: string
        status:
          type: string

  search_by_assignee:
    description: Search patents by assignee (company/organization)
    input:
      type: object
      properties:
        assignee:
          type: string
          description: Company or organization name (e.g. "Apple", "Microsoft")
          example: "Apple"
        limit:
          type: integer
          description: Maximum number of results (default 10, max 50)
          default: 10
    output:
      type: array
      items:
        type: object
        properties:
          patent_id:
            type: string
          title:
            type: string
          abstract:
            type: string
          assignee:
            type: string
          inventors:
            type: string
          filing_date:
            type: string
          publication_date:
            type: string
          cpc_classifications:
            type: string
          url:
            type: string

  search_by_classification:
    description: Search patents by CPC classification code
    input:
      type: object
      properties:
        class_code:
          type: string
          description: CPC classification code (e.g. "G06N", "G06F")
          example: "G06N"
        limit:
          type: integer
          description: Maximum number of results (default 10, max 50)
          default: 10
    output:
      type: array
      items:
        type: object
        properties:
          patent_id:
            type: string
          title:
            type: string
          abstract:
            type: string
          assignee:
            type: string
          inventors:
            type: string
          filing_date:
            type: string
          publication_date:
            type: string
          cpc_classifications:
            type: string
          url:
            type: string
